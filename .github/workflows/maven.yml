name: Maven Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 25
        cache: maven
    - name: Build with Maven
      run: mvn test -B -Dmatsim.preferLocalDtds=true
