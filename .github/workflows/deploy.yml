name: Deploy to packagecloud

on:
  release:
    types:
      - created

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 21
        cache: maven
    - name: Deploy with Maven
      run: mvn --batch-mode deploy
      env:
        MAVEN_USERNAME: ${{ secrets.PACKAGECLOUD_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.PACKAGECLOUD_TOKEN }}
